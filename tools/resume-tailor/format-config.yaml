# =============================================================================
# Resume formatting configuration.
# Edit this file to change resume appearance — no Python code changes needed.
# Override per-user by placing a copy at:
#   applications/resumes/data/{user-slug}/format-config.yaml
# (the tool will use the per-user file if present, otherwise this default).
# =============================================================================

# Font sizes (points)
fonts:
  name: 18
  contact: 11
  title: 14
  summary: 11
  skills: 11
  heading: 14         # WORK EXPERIENCE, EDUCATION, CERTIFICATIONS
  company: 11
  role: 10            # role title, location, dates
  description: 10     # company description italic
  bullet: 11
  education: 11
  certification: 11

# Spacing (points)
spacing:
  before_section: 12  # before major section headings
  bullet_after: 0
  line_spacing: 13
  after_name: 1
  after_contact: 1
  after_title: 2
  after_summary: 3
  after_skills: 4
  before_company: 4
  after_edu_entry: 1
  after_cert_entry: 1

# Page margins (inches)
margins:
  top: 0.4
  bottom: 0.4
  left: 0.6
  right: 0.6

# Bullet count thresholds
thresholds:
  min_bullets: 22         # page-2 fill target
  hard_fail_bullets: 17
  max_per_role: 4         # default max bullets per company section
