# =============================================================================
# skills-inventory.yaml for Jane Demo (FICTIONAL)
# Read by tools/resume-tailor/tailor-resume.py to build the skills line.
# Shape: technical_skills is a dict of category -> list of skill objects.
# Each skill has name + role_relevance (which schemas.skills_filter values
# match) + priority (higher = preferred when slots are limited).
# =============================================================================

