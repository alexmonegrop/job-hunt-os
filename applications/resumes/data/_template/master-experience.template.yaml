# =============================================================================
# master-experience.template.yaml
# Annotated template for the per-user master-experience YAML.
# Copy this to applications/resumes/data/{your-slug}/master-experience.yaml and
# fill in with your real data. NEVER commit your real master-experience.yaml.
#
# This is the SINGLE SOURCE OF TRUTH for your work experience. The
# resume-tailor tool reads it, scores each achievement against a job posting,
# and selects the top-scoring achievements per role to include in the
# tailored resume.
#
# See applications/resumes/data/jane-demo/master-experience.yaml for a
# fully-populated example using fictional data.
# =============================================================================

contact:
  full_name: "Your Full Name"
  location: "City, Country"
  phone: "+00 0000 0000"
  email: "you@example.com"
  linkedin: "linkedin.com/in/your-handle"
  availability: "Available immediately"
  # nationality: "..."     # only include if relevant to target market
  # visa_status: "..."     # only include if relevant to target market

# summary_variants — each variant has a `title` (resume header) and `text`
# (summary paragraph). The resume-tailor tool selects one based on the
# job's role_category, falling back to the `template` field if no role
# category is set.
#
# Required keys: innovation, delivery, generic, pm, product, ai_dt, operations.
# (You can omit ones that don't apply — the tool falls back to `generic`.)
summary_variants:
  innovation:
    title: "<emphasises startup/founder, AI/ML, product innovation>"
    text: >
      <2-3 sentences emphasising entrepreneurship, product building,
      AI/ML innovation>
    best_for:
      - innovation
      - founder
  delivery:
    title: "<emphasises program management, large-scale delivery>"
    text: >
      <2-3 sentences emphasising program/project management, execution,
      stakeholder mgmt>
    best_for:
      - program_management
      - delivery
  generic:
    title: "<balanced default>"
    text: >
      <2-3 balanced sentences for general use>
    best_for:
      - mixed_roles
  pm:
    title: "<role-specific PM title>"
    text: >
      <PM-specific summary>
  product:
    title: "<role-specific Product title>"
    text: >
      <Product-specific summary>
  ai_dt:
    title: "<role-specific AI / Digital Transformation title>"
    text: >
      <AI/DT-specific summary>
  operations:
    title: "<role-specific Operations title>"
    text: >
      <Operations-specific summary>

# experience — list of jobs in reverse chronological order.
experience:
  - company: "Most Recent Company"
    # title_variants — different title strings per role variant.
    # The tool picks the variant matching the job's role_category.
    # Use the same title for all variants if you don't need to vary.
    title_variants:
      pm: "Senior Program Manager"
      delivery: "Senior Program Manager"
      ai_dt: "Senior Program Manager, AI/Digital"
      product: "Senior Product Manager"
      operations: "Senior Operations Manager"
      generic: "Senior Program Manager"
      innovation: "Senior Program Manager"
      all: "Senior Program Manager"
    location: "City, Country"
    dates: "YYYY-MM to Present"
    description: "1-2 line description of role scope"
    # description_variants:    # optional — different role description per variant
    #   pm: "..."
    #   product: "..."
    achievements:
      - id: "co1-01"           # short stable ID (used in role-type-schemas + text_overrides)
        text: |
          Led $X million digital transformation program across 5 business
          units, delivering [outcome] in [timeframe] with [%] budget deviation.
        priority: 10           # 1-10; 10 = flagship, 5 = filler
        tags:                  # filter tags
          - delivery
          - digital_transformation
          - program_management
        metrics:               # extracted numbers (used for keyword matching)
          - "$X million"
          - "5 business units"
          - "[%] budget deviation"
        functional_areas:      # used for role-type filtering
          - stakeholder_management
          - program_management
        better_for: [PM, Operations]   # role categories this bullet works well for
        avoid_for: []                  # role categories this bullet hurts in
        variants: [delivery, generic, pm, operations]   # which summary variants to include in
      - id: "co1-02"
        text: |
          <Next bullet — keep specific, metric-rich, action verb first>
        priority: 8
        tags: [...]
        metrics: [...]
        functional_areas: [...]
        better_for: [...]
        avoid_for: []
        variants: [...]

  - company: "Previous Company"
    title_variants:
      all: "Program Manager"
    location: "City, Country"
    dates: "YYYY-MM to YYYY-MM"
    description: "..."
    achievements:
      - id: "co2-01"
        text: "..."
        priority: 9
        tags: [...]
        metrics: [...]
        functional_areas: [...]
        better_for: [...]
        avoid_for: []
        variants: [...]

  # Add as many experience entries as needed.
  # Special: a Career Break entry (no achievements):
  # - company: "Career Break"
  #   title_variants: {}
  #   location: ""
  #   dates: "YYYY-MM to YYYY-MM"
  #   description: "Sabbatical / family / health / other"
  #   achievements: []

education:
  - degree: "BSc, Industrial Engineering"
    institution: "University Name"
    location: "City, Country"
    date: "YYYY-MM"

certifications:
  - name: "PMP"
    issuer: "Project Management Institute"
    location: "Online"
    date: "YYYY-MM"
    variants: [delivery, generic, pm, operations, all]   # which variants to include this cert in
  - name: "CSPO"
    issuer: "Scrum Alliance"
    location: "Online"
    date: "YYYY-MM"
    variants: [delivery, generic, product, ai_dt, pm, all]

# =============================================================================
# Tagging vocabulary — use these tags consistently to make filtering work well.
# Add your own; just be consistent.
#
# Industry: ai, ml, robotics, energy, fintech, healthtech, edtech, contech,
#           industrial, government, b2b, b2c
# Function: program_management, product_management, operations, strategy,
#           digital_transformation, product, engineering, sales, consulting
# Skill:    sql, python, aws, docker, llm, rag, vector_search, design_thinking,
#           agile, scrum, prince2, lean, six_sigma
# Region:   <add tags from config/user-profile.yaml target_regions[]>
# Type:     full_time, consulting, contract, founder, advisor
# =============================================================================
