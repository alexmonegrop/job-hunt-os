# Cross-region defaults -------------------------------------------------------
# Applied when no region-specific override is found.
defaults:
  research_query_templates:
    - "[Company] recent news <year>"
    - "[Company] partnerships <year>"
    - "[Company] strategy expansion <year>"
  insight_categories:
    - "Regulatory vs growth velocity"
    - "Compliance mandates vs market timing"
    - "Technical capability vs organisational readiness"
    - "Marketing narrative vs operational reality"
    - "Strategic positioning vs market reality"
