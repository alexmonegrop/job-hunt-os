# =============================================================================
# regions.example.yaml
# Copy to regions.yaml and customise. Read by skills for region-specific
# context: job boards, flagship buyers, regional dynamics, and language cues.
# =============================================================================

# Region presets --------------------------------------------------------------
# Each region defines its own context. The active user's
# user_profile.target_regions[] selects which presets are loaded.
regions:
  - name: "Demoland"
    description: "Fictional reference region. Replace with your real target."
    countries: ["Demoland"]
    primary_cities: ["Northgate", "Riverbend", "Port Argent"]
    languages_required: []          # languages commonly required by employers
    languages_preferred: ["Federation Standard"]
    flagship_buyers:                # major regional buyers / state-owned enterprises
      - "Demoland National Energy"
      - "Demoland Sovereign Wealth Fund"
      - "Federation Infrastructure Authority"
    job_boards:
      - name: "DemolandJobs"
        url_pattern: "site:demolandjobs.example"
        method: "WebSearch"
      - name: "Federation Talent"
        url_pattern: "site:federationtalent.example"
        method: "WebSearch + Playwright"
    typical_dynamics:
      - "Government approval cycles are non-negotiable; private cycles bend"
      - "Local-content rules extend technical timelines"
      - "Decision makers rarely appear on org charts"
    work_authorisation_notes:
      - "Demoland citizens / residents preferred"
      - "Sponsorship available at scaleups but not most government contractors"
    research_query_templates:
      - "[Company] Demoland expansion <year>"
      - "[Company] Northgate office <year>"
      - "[Company] Federation partnership"

